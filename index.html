<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Animação</title>
</head>
<body>
    <h1>Animação</h1>
    <canvas width="600" height="400"></canvas>
    <div class="container">
        <h2>Aperte <span class="key">A</span> para ir para a esquerda</h2>
        <h2>Aperte <span class="key">D</span> para ir para a direita</h2>
        <h2>Aperte <span class="key">W</span> ou <span class="key">Espaço</span> para pular</h2>
    </div>
    <script src="main.js"></script>
</body>
</html>
